<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet" />
    <style>
      @font-face { font-family: "Noto Sans JP"; src: local("Noto Sans JP"); }
      @font-face { font-family: "Noto Serif JP"; src: local("Noto Serif JP"); }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 1080px; height: 1920px; overflow: hidden;
        background: linear-gradient(180deg, #14213d 0%, #1d2d50 100%);
      }
      body { font-family: "Noto Sans JP", sans-serif; color: #fff; }
      .video-bg {
        position: absolute; left: 60px; top: 320px; width: 960px; height: 1240px;
        object-fit: cover; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.55);
      }
      .title {
        position: absolute; top: 100px; left: 60px; right: 60px;
        font-family: "Noto Serif JP", serif;
        font-size: 76px; font-weight: 900; line-height: 1.2;
        text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      }
      .subtitle {
        position: absolute; top: 240px; left: 60px; right: 60px;
        font-size: 38px; font-weight: 700; color: #c9d4ff; line-height: 1.4;
      }
      .narration-box {
        position: absolute; left: 60px; right: 60px; bottom: 100px;
        background: rgba(0,0,0,0.78);
        border-left: 8px solid #4dabf7;
        padding: 36px 40px; border-radius: 8px 24px 24px 8px;
      }
      .narration {
        font-size: 46px; line-height: 1.45; font-weight: 700;
        letter-spacing: 0.02em;
      }
      .channel-tag {
        position: absolute; top: 100px; right: 60px;
        background: #4dabf7; color: #14213d;
        font-size: 32px; font-weight: 900;
        padding: 12px 22px; border-radius: 12px; letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="moru_shorts"
      data-start="0"
      data-duration="{{duration}}"
      data-width="1080"
      data-height="1920"
    >
      <video class="clip video-bg" data-start="0" data-duration="{{duration}}" data-track-index="1"
             src="assets/main.mp4" muted playsinline></video>

      <div class="channel-tag clip" data-start="0" data-duration="{{duration}}" data-track-index="2">SHORTS</div>
      <div class="title clip" data-start="0" data-duration="{{duration}}" data-track-index="3">{{title}}</div>
      <div class="subtitle clip" data-start="0.3" data-duration="{{duration}}" data-track-index="4">{{subtitle}}</div>

      <div class="narration-box clip" data-start="1.0" data-duration="{{duration}}" data-track-index="5">
        <div class="narration">{{narration}}</div>
      </div>
    </div>
  </body>
</html>
