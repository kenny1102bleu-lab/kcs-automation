<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800&family=Noto+Sans+TC:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
      @font-face { font-family: "Noto Sans JP"; src: local("Noto Sans JP"); }
      @font-face { font-family: "Noto Sans TC"; src: local("Noto Sans TC"); }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #000; }
      body { font-family: "Noto Sans JP", "Noto Sans TC", sans-serif; }
      .video-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
      .caption {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        font-weight: 800;
        text-shadow: 0 0 18px rgba(0,0,0,0.85), 0 4px 12px rgba(0,0,0,0.7);
        line-height: 1.3;
      }
      .caption-ja { bottom: 140px; font-size: 84px; color: #fff; letter-spacing: 0.04em; }
      .caption-tc {
        bottom: 64px; font-size: 54px; color: #fff; letter-spacing: 0.05em;
        -webkit-text-stroke: 2px rgba(190, 50, 110, 0.95);
      }
      .brand-tag {
        position: absolute; top: 48px; right: 60px;
        font-size: 36px; color: #fff;
        background: rgba(190, 50, 110, 0.75);
        padding: 14px 28px; border-radius: 999px;
        font-weight: 700; letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="hal_x_post"
      data-start="0"
      data-duration="{{duration}}"
      data-width="1920"
      data-height="1080"
    >
      <video class="clip video-bg" data-start="0" data-duration="{{duration}}" data-track-index="1"
             src="assets/main.mp4" muted playsinline></video>

      <div class="brand-tag clip" data-start="0" data-duration="{{duration}}" data-track-index="2">HAL</div>

      <div class="caption caption-ja clip" data-start="0.3" data-duration="{{caption_duration}}" data-track-index="3">{{caption_ja}}</div>
      <div class="caption caption-tc clip" data-start="0.3" data-duration="{{caption_duration}}" data-track-index="4">{{caption_tc}}</div>
    </div>
  </body>
</html>
