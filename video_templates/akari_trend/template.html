<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      @font-face { font-family: "Noto Sans JP"; src: local("Noto Sans JP"); }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 1920px; height: 1080px; overflow: hidden;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      }
      body { font-family: "Noto Sans JP", sans-serif; color: #fff; }
      .header {
        position: absolute; top: 60px; left: 80px; right: 80px;
        display: flex; align-items: center; gap: 24px;
      }
      .channel-badge {
        background: #ff8c42; color: #0f172a;
        font-size: 32px; font-weight: 900;
        padding: 12px 24px; border-radius: 10px; letter-spacing: 0.12em;
      }
      .date-label {
        font-size: 28px; color: #a0b8d9; font-weight: 600; letter-spacing: 0.06em;
      }
      .trend-title {
        position: absolute; top: 150px; left: 80px; right: 80px;
        font-size: 80px; font-weight: 900; line-height: 1.18;
        text-shadow: 0 2px 16px rgba(0,0,0,0.5);
      }
      .summary {
        position: absolute; top: 360px; left: 80px; right: 80px;
        font-size: 40px; font-weight: 600; line-height: 1.5;
        color: #d8e3f5; letter-spacing: 0.02em;
      }
      .ranking {
        position: absolute; bottom: 90px; left: 80px; right: 80px;
        display: flex; gap: 40px; justify-content: space-between;
      }
      .rank-item {
        flex: 1;
        background: rgba(255,255,255,0.08);
        border-top: 6px solid #ff8c42;
        padding: 28px 32px; border-radius: 0 0 18px 18px;
      }
      .rank-num { font-size: 32px; font-weight: 900; color: #ff8c42; }
      .rank-text { font-size: 38px; font-weight: 700; line-height: 1.3; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="akari_trend"
      data-start="0"
      data-duration="{{duration}}"
      data-width="1920"
      data-height="1080"
    >
      <div class="header clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
        <div class="channel-badge">TREND</div>
        <div class="date-label">{{date_label}}</div>
      </div>

      <div class="trend-title clip" data-start="0.2" data-duration="{{duration}}" data-track-index="2">{{trend_title}}</div>
      <div class="summary clip" data-start="0.6" data-duration="{{duration}}" data-track-index="3">{{summary}}</div>

      <div class="ranking clip" data-start="1.2" data-duration="{{duration}}" data-track-index="4">
        <div class="rank-item">
          <div class="rank-num">#1</div>
          <div class="rank-text">{{rank1}}</div>
        </div>
        <div class="rank-item">
          <div class="rank-num">#2</div>
          <div class="rank-text">{{rank2}}</div>
        </div>
        <div class="rank-item">
          <div class="rank-num">#3</div>
          <div class="rank-text">{{rank3}}</div>
        </div>
      </div>
    </div>
  </body>
</html>
