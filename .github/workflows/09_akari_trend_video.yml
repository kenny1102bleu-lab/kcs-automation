name: WF-09 アカリ トレンド動画生成

on:
  schedule:
    - cron: '30 23 * * *'  # JST 08:30 毎日（朝礼の少し前）
  workflow_dispatch:
    inputs:
      theme:
        description: '題材（空欄で自動: 本日のAI/開発/SNSトレンド）'
        required: false
        default: ''

jobs:
  akari:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'
      LANG: C.UTF-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/akari_trend_video.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URLS: ${{ secrets.DISCORD_WEBHOOK_URLS }}
          GITHUB_DISPATCH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          POST_THEME: ${{ inputs.theme }}
