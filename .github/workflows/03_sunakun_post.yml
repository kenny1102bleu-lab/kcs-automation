name: WF-03 すなくん投稿フロー

on:
  schedule:
    - cron: '12 0 * * *'  # JST 09:12（毎時00分の一斉スケジュールは遅延/スキップされやすいためオフセット）
    - cron: '12 3 * * *'  # JST 12:12
    - cron: '12 10 * * *' # JST 19:12
    - cron: '12 13 * * *' # JST 22:12
  workflow_dispatch:
    inputs:
      theme:
        description: '投稿テーマ（空欄で自動選択）'
        required: false
        default: ''
      affiliate_url:
        description: '手動アフィリエイトリンク（テーマ投稿のリプ欄に添付、空欄可）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sunakun_post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/sunakun_post.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URLS: ${{ secrets.DISCORD_WEBHOOK_URLS }}
          GAS_NEWS_API_URL: ${{ secrets.GAS_NEWS_API_URL }}
          BOT_WEBHOOK_URL: ${{ secrets.BOT_WEBHOOK_URL }}
          MAX_VIDEO_PER_MONTH: '10'
          POST_THEME: ${{ inputs.theme }}
          POST_AFFILIATE_URL: ${{ inputs.affiliate_url }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          SUNAKUN_TWITTER_API_KEY: ${{ secrets.SUNAKUN_TWITTER_API_KEY }}
          SUNAKUN_TWITTER_API_SECRET: ${{ secrets.SUNAKUN_TWITTER_API_SECRET }}
          SUNAKUN_TWITTER_ACCESS_TOKEN: ${{ secrets.SUNAKUN_TWITTER_ACCESS_TOKEN }}
          SUNAKUN_TWITTER_ACCESS_SECRET: ${{ secrets.SUNAKUN_TWITTER_ACCESS_SECRET }}
          SUNAKUN_X_USERNAME: ${{ secrets.SUNAKUN_X_USERNAME }}
          SUNAKUN_X_USER_ID: ${{ secrets.SUNAKUN_X_USER_ID }}
      - name: Upload generated media as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-${{ github.run_id }}
          path: media_out/
          retention-days: 1
          if-no-files-found: ignore
      - name: Commit posted-products history and amazon queue state
        if: always()
        run: |
          if [ -n "$(git status --porcelain data/suna_posted_products.json data/amazon_product_queue.json 2>/dev/null)" ]; then
            git config user.email "suna-bot@kcs.local"
            git config user.name "Suna Bot"
            git add data/suna_posted_products.json data/amazon_product_queue.json
            git commit -m "chore: update suna posted-products history / amazon queue"
            git pull --rebase origin master
            git push origin HEAD:master
          fi
