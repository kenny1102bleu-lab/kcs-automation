name: WF-03 すなくん投稿フロー

on:
  schedule:
    - cron: '0 3 * * *'   # JST 12:00
    - cron: '0 10 * * *'  # JST 19:00
    - cron: '0 13 * * *'  # JST 22:00
  workflow_dispatch:
    inputs:
      theme:
        description: '投稿テーマ（空欄で自動選択）'
        required: false
        default: ''

jobs:
  sunakun_post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/sunakun_post.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URLS: ${{ secrets.DISCORD_WEBHOOK_URLS }}
          GAS_NEWS_API_URL: ${{ secrets.GAS_NEWS_API_URL }}
          MAX_VIDEO_PER_MONTH: '10'
          POST_THEME: ${{ inputs.theme }}
      - name: Upload generated media as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-${{ github.run_id }}
          path: media_out/
          retention-days: 1
          if-no-files-found: ignore
