name: WF-02 HAL投稿フロー

on:
  schedule:
    - cron: '0 12 * * 1,3,5'  # JST 21:00 月水金
  workflow_dispatch:
    inputs:
      theme:
        description: '投稿テーマ（空欄で自動選択）'
        required: false
        default: ''

jobs:
  hal_post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - id: gen
        run: |
          set -o pipefail
          python scripts/hal_post.py | tee /tmp/hal_post.log
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URLS: ${{ secrets.DISCORD_WEBHOOK_URLS }}
          GAS_NEWS_API_URL: ${{ secrets.GAS_NEWS_API_URL }}
          BOT_WEBHOOK_URL: ${{ secrets.BOT_WEBHOOK_URL }}
          MAX_VIDEO_PER_MONTH: '10'
          POST_THEME: ${{ inputs.theme }}
      - name: Upload generated media as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-${{ github.run_id }}
          path: media_out/
          retention-days: 1
          if-no-files-found: ignore
